<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Digital</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 8px solid #d90429; /* Merah Tegas */
        }
        .header {
            padding: 20px;
            text-align: center;
            background-color: #ffffff;
        }
        .header h1 {
            color: #d90429;
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .content {
            padding: 25px;
            text-align: center;
        }
        .qr-placeholder {
            width: 150px;
            height: 150px;
            background-color: #eee;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #d90429;
            border-radius: 10px;
            color: #d90429;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-order {
            background-color: #d90429;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-order:hover {
            background-color: #ef233c;
        }
        .footer {
            padding: 15px;
            background-color: #f8f9fa;
            font-size: 10px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SECURE ACCESS</h1>
    </div>
    <div class="content">
        <div class="qr-placeholder">GENERATE QR</div>
        <div class="input-group">
            <label>NAMA NASABAH (SECRET)</label>
            <input type="text" placeholder="Masukkan nama...">
        </div>
        <div class="input-group">
            <label>NOMINAL PINJAMAN</label>
            <input type="number" placeholder="Contoh: 400000">
        </div>
        <div class="input-group">
            <label>JAMINAN BARANG</label>
            <input type="text" placeholder="Contoh: HP, Jam Tangan...">
        </div>
        <button class="btn-order">PESAN KODE VERIFIKASI</button>
    </div>
    <div class="footer">
        Dilarang membocorkan data transaksi ini kepada pihak ketiga.
    </div>
</div>

</body>
</html>
